<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

body {
font-family: 'Segoe UI', Tahoma, sans-serif;
background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
color: #fff;
display: flex;
justify-content: center;
align-items: center;
min-height: 100vh;
}

/* Container utama */
.container {
text-align: center;
padding: 40px;
max-width: 500px;
background: rgba(255,255,255,0.05);
backdrop-filter: blur(12px);
border-radius: 20px;
box-shadow: 0 0 40px rgba(0,0,0,0.8);
}

/* Judul */
h1 {
font-size: 26px;
margin-bottom: 20px;
color: #FFD700;
text-shadow: 0 0 10px rgba(255,215,0,0.7);
}

/* List */
ul {
text-align: left;
margin: 20px 0;
}

ul li {
margin-bottom: 10px;
font-size: 15px;
}

/* Button gambar */
.image-box {
margin-top: 20px;
}

.image-box img {
max-width: 100%;
border-radius: 20px;
border: 3px solid rgba(255,255,255,0.2);
transition: all 0.3s ease;
box-shadow: 0 0 20px rgba(255,215,0,0.3);
}

.image-box img:hover {
transform: scale(1.05);
box-shadow: 0 0 30px rgba(255,215,0,0.8);
}

/* CTA text */
.cta {
margin-top: 15px;
font-size: 14px;
opacity: 0.8;
}

/* Footer */
footer {
margin-top: 30px;
font-size: 12px;
opacity: 0.6;
}

/* Animasi glow */
@keyframes glow {
0% { box-shadow: 0 0 5px gold; }
50% { box-shadow: 0 0 20px gold; }
100% { box-shadow: 0 0 5px gold; }
}

</style>
